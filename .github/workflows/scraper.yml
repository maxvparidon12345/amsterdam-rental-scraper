name: Amsterdam Rental Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Herstel seen.json uit cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-json-${{ github.run_id }}
          restore-keys: |
            seen-json-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Installeer xvfb en Playwright browser
        run: |
          sudo apt-get install -y xvfb
          playwright install chromium --with-deps

      - name: Draai scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1
          python main.py

      - name: Zorg dat seen.json bestaat voor cache
        run: test -f seen.json || echo '[]' > seen.json
